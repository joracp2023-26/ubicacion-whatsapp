<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compartir ubicación por WhatsApp</title>
<style>
  :root {
    --bg: #eef2ee;
    --card: #ffffff;
    --whatsapp: #25D366;
    --whatsapp-dark: #128C7E;
    --text-dark: #1c2b1f;
    --text-muted: #5b6b5e;
    --pin: #E63946;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  .pin-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  h1 {
    font-size: 19px;
    color: var(--text-dark);
    margin: 0 0 6px;
    font-weight: 600;
  }

  p.sub {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 24px;
    line-height: 1.5;
  }

  .phone-row {
    margin-bottom: 18px;
    text-align: left;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  input[type="tel"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid #dde3dd;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="tel"]:focus {
    border-color: var(--whatsapp);
  }

  button.share-btn {
    width: 100%;
    background: var(--whatsapp);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }

  button.share-btn:hover { background: var(--whatsapp-dark); }
  button.share-btn:active { transform: scale(0.98); }
  button.share-btn:focus-visible { outline: 3px solid #128C7E; outline-offset: 2px; }

  button.share-btn:disabled {
    background: #b7c4b9;
    cursor: not-allowed;
  }

  .status {
    margin-top: 14px;
    font-size: 13px;
    min-height: 18px;
    color: var(--text-muted);
  }

  .status.error { color: #c0392b; }
  .status.ok { color: var(--whatsapp-dark); }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  button.share-btn.loading .spinner { display: inline-block; }
  button.share-btn.loading .btn-label { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="pin-icon">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C7.6 2 4 5.6 4 10c0 5.7 7 11.5 7.3 11.7a1 1 0 0 0 1.4 0C13 21.5 20 15.7 20 10c0-4.4-3.6-8-8-8z" fill="#25D366"/>
      <circle cx="12" cy="10" r="3.3" fill="white"/>
    </svg>
  </div>

  <h1>Compartir tu ubicación</h1>
  <p class="sub">Toca el botón para abrir WhatsApp con tu ubicación actual lista para enviar.</p>

  <input type="hidden" id="phone" value="50432146202">

  <button class="share-btn" id="shareBtn" onclick="shareLocation()">
    <span class="spinner"></span>
    <span class="btn-label">📍 Enviar mi ubicación</span>
  </button>

  <div class="status" id="status"></div>
</div>

<script>
function shareLocation() {
  const btn = document.getElementById('shareBtn');
  const status = document.getElementById('status');
  const phone = document.getElementById('phone').value.trim().replace(/\D/g, '');

  status.textContent = '';
  status.className = 'status';

  if (!phone) {
    status.textContent = 'Escribe el número de WhatsApp de la persona a la que quieres enviar tu ubicación.';
    status.className = 'status error';
    return;
  }

  if (!navigator.geolocation) {
    status.textContent = 'Tu navegador no soporta geolocalización.';
    status.className = 'status error';
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;
  status.textContent = 'Obteniendo tu ubicación...';

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const mapsLink = `https://maps.google.com/?q=${lat},${lng}`;
      const message = `📍 Mi ubicación actual: ${mapsLink}`;
      const waLink = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

      status.textContent = 'Abriendo WhatsApp...';
      status.className = 'status ok';
      btn.classList.remove('loading');
      btn.disabled = false;

      window.open(waLink, '_blank');
    },
    (error) => {
      btn.classList.remove('loading');
      btn.disabled = false;
      let msg = 'No se pudo obtener tu ubicación.';
      if (error.code === error.PERMISSION_DENIED) {
        msg = 'Debes permitir el acceso a tu ubicación para poder compartirla.';
      } else if (error.code === error.TIMEOUT) {
        msg = 'Se agotó el tiempo esperando tu ubicación. Intenta de nuevo.';
      }
      status.textContent = msg;
      status.className = 'status error';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
</script>

</body>
</html>
